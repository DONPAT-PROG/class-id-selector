<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Class Id Selector</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <p class="odd">
        Number 1: This is the first class
    </p>

    <div class="even">
        <p class="second">
            Number 2: This is another class
        </p>
    </div>

    <p  class="odd" id="special-class">
        Number 3: This is a special class with multiple classes
    </p>

    <div class="even">
        <p class="fourth">
            Number 4: Another special class
        </p>
    </div>

    <p class="odd">
        Number 5: Last but not the least.
    </p>
</body>
</html>
